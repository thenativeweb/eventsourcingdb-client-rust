version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    assignees:
      - goloroden
    labels:
      - Dependencies
    allow:
      - dependency-type: direct
    commit-message:
      prefix: fix
    groups:
      cargo:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    assignees:
      - goloroden
    labels:
      - Dependencies
    commit-message:
      prefix: chore
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
